name: build windows

defaults:
  run:
    shell: powershell

on:
  workflow_call:
    inputs:
      cuda:
        type: string
        required: false
        default: "13.0"
      host:
        type: string
        required: false
        default: "cl14.44"
      devcontainer_version:
        type: string
        required: false
        default: "25.12"
      image:
        type: string
        required: false
        default: ""
      runner:
        type: string
        required: false
        default: "windows-amd64-cpu16"
      std:
        type: string
        required: false
        default: "17"
      arch:
        type: string
        required: false
        default: ""
      gpu:
        type: boolean
        required: false
        default: false
      gpu_devices:
        type: string
        required: false
        default: "all"
      run_tests:
        type: boolean
        required: false
        default: false
      device_testing:
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      cuda:
        description: "CUDA Toolkit version"
        type: string
        required: false
        default: "13.0"
      host:
        description: "Host compiler tag"
        type: string
        required: false
        default: "cl14.44"
      devcontainer_version:
        description: "RAPIDS devcontainer version"
        type: string
        required: false
        default: "25.12"
      image:
        description: "Windows devcontainer image override"
        type: string
        required: false
        default: ""
      runner:
        description: "Windows runner"
        type: string
        required: false
        default: "windows-amd64-cpu16"
      std:
        description: "C++/CUDA standard"
        type: choice
        options: ["17", "20"]
        required: false
        default: "17"
      arch:
        description: "CMAKE_CUDA_ARCHITECTURES override"
        type: string
        required: false
        default: ""
      gpu:
        description: "Expose host GPUs to the Windows devcontainer"
        type: boolean
        required: false
        default: false
      gpu_devices:
        description: "GPU devices to expose when gpu is true: 'all' or 'device=0,1'"
        type: string
        required: false
        default: "all"
      run_tests:
        description: "Run CTest after building"
        type: boolean
        required: false
        default: false
      device_testing:
        description: "Enable tests that require a CUDA-capable device"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows CUDA${{ inputs.cuda }} ${{ inputs.host }} C++${{ inputs.std }}
    runs-on: ${{ github.repository == 'NVIDIA/nvbench' && inputs.runner || 'windows-latest' }}
    permissions:
      id-token: write
      contents: read
    env:
      WINDOWS_CI_IMAGE: ${{ inputs.image != '' && inputs.image || format('rapidsai/devcontainers:{0}-cuda{1}-{2}', inputs.devcontainer_version, inputs.cuda, inputs.host) }}
      SCCACHE_BUCKET: rapids-sccache-devs
      SCCACHE_REGION: us-east-2
      SCCACHE_IDLE_TIMEOUT: "0"
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_NO_CREDENTIALS: "false"
      SCCACHE_S3_USE_PREPROCESSOR_CACHE_MODE: "true"
      SCCACHE_S3_PREPROCESSOR_CACHE_KEY_PREFIX: nvbench-preprocessor-cache
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Add NVCC problem matcher
        run: |
          echo "::add-matcher::.github/problem-matchers/problem-matcher.json"

      - name: Get AWS credentials for sccache bucket
        if: ${{ github.repository == 'NVIDIA/nvbench' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::279114543810:role/gha-oidc-NVIDIA
          aws-region: us-east-2
          role-duration-seconds: 43200

      - name: Validate Windows build inputs
        id: validate_windows_build_inputs
        env:
          NVBENCH_WINDOWS_CUDA: ${{ inputs.cuda }}
          NVBENCH_WINDOWS_STD: ${{ inputs.std }}
          NVBENCH_WINDOWS_ARCH: ${{ inputs.arch }}
          NVBENCH_WINDOWS_GPU: ${{ inputs.gpu }}
          NVBENCH_WINDOWS_GPU_DEVICES: ${{ inputs.gpu_devices }}
          NVBENCH_WINDOWS_RUN_TESTS: ${{ inputs.run_tests }}
          NVBENCH_WINDOWS_DEVICE_TESTING: ${{ inputs.device_testing }}
          NVBENCH_GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"

          if ($env:NVBENCH_WINDOWS_CUDA -notmatch '^\d+\.\d+$') {
            throw "Invalid CUDA version '$env:NVBENCH_WINDOWS_CUDA'. Expected '<major>.<minor>', for example '13.0'."
          }

          if (@("17", "20") -notcontains $env:NVBENCH_WINDOWS_STD) {
            throw "Invalid C++ standard '$env:NVBENCH_WINDOWS_STD'. Expected '17' or '20'."
          }

          $gpuEnabled = $env:NVBENCH_WINDOWS_GPU -eq "true"
          $runTests = $env:NVBENCH_WINDOWS_RUN_TESTS -eq "true"
          $deviceTesting = $env:NVBENCH_WINDOWS_DEVICE_TESTING -eq "true"

          if ($gpuEnabled -and $env:NVBENCH_GITHUB_REPOSITORY -ne "NVIDIA/nvbench") {
            throw "Invalid Windows build inputs: gpu=true is only supported in NVIDIA/nvbench, where the configured runner can be selected."
          }

          if ($deviceTesting -and -not $runTests) {
            throw "Invalid Windows build inputs: device_testing=true requires run_tests=true."
          }

          if ($runTests -and $deviceTesting -and -not $gpuEnabled) {
            throw "Invalid Windows build inputs: run_tests=true and device_testing=true require gpu=true."
          }

          $arch = "$env:NVBENCH_WINDOWS_ARCH".Trim()
          $normalizedArch = $arch
          if ($arch) {
            if (@("all", "all-major", "native") -notcontains $arch) {
              $archItems = @($arch -split '[;,]' | ForEach-Object { $_.Trim() } | Where-Object { $_ })
              if ($archItems.Length -eq 0) {
                throw "Invalid CMAKE_CUDA_ARCHITECTURES value '$arch'. Expected empty, 'all', 'all-major', 'native', or a list like '80;90-real'."
              }
              foreach ($archItem in $archItems) {
                if ($archItem -notmatch '^\d{2,3}(-real|-virtual)?$') {
                  throw "Invalid CMAKE_CUDA_ARCHITECTURES value '$arch'. Expected empty, 'all', 'all-major', 'native', or a list like '80;90-real'."
                }
              }
              $normalizedArch = $archItems -join ';'
            }
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "arch=$normalizedArch"

          $gpuDevices = "$env:NVBENCH_WINDOWS_GPU_DEVICES".Trim()
          if ($gpuDevices -and $gpuDevices -ne "all" -and $gpuDevices -notmatch '^device=\d+(,\d+)*$') {
            throw "Invalid GPU devices value '$gpuDevices'. Expected 'all' or a device list like 'device=0,1'."
          }
          if ($gpuEnabled -and -not $gpuDevices) {
            throw "GPU devices must not be empty when GPU support is enabled."
          }
          if (-not $gpuEnabled -and $gpuDevices -and $gpuDevices -ne "all") {
            throw "Invalid Windows build inputs: gpu_devices may only select specific devices when gpu=true."
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "gpu_devices=$gpuDevices"

      - name: Fetch Windows devcontainer image
        run: |
          docker pull "$env:WINDOWS_CI_IMAGE"

      - name: Build NVBench
        env:
          NVBENCH_WINDOWS_CUDA: ${{ inputs.cuda }}
          NVBENCH_WINDOWS_STD: ${{ inputs.std }}
          NVBENCH_WINDOWS_ARCH: ${{ steps.validate_windows_build_inputs.outputs.arch }}
          NVBENCH_WINDOWS_GPU: ${{ inputs.gpu }}
          NVBENCH_WINDOWS_GPU_DEVICES: ${{ steps.validate_windows_build_inputs.outputs.gpu_devices }}
          NVBENCH_WINDOWS_RUN_TESTS: ${{ inputs.run_tests }}
          NVBENCH_WINDOWS_DEVICE_TESTING: ${{ inputs.device_testing }}
        run: |
          $ErrorActionPreference = "Stop"

          $hostRepo = "${{ github.workspace }}".Replace('\', '/')
          $containerRepo = "C:/nvbench"
          $script = Join-Path $env:RUNNER_TEMP "nvbench-windows-ci.ps1"

          @"
          `$ErrorActionPreference = 'Stop'
          git config --global --add safe.directory '$containerRepo'
          & '$containerRepo/ci/windows/install_cuda_profiler_api.ps1' -cudaVersion "`$env:NVBENCH_WINDOWS_CUDA"
          & '$containerRepo/ci/windows/build_nvbench.ps1' -std "`$env:NVBENCH_WINDOWS_STD" -arch "`$env:NVBENCH_WINDOWS_ARCH" -run-tests "`$env:NVBENCH_WINDOWS_RUN_TESTS" -device-testing "`$env:NVBENCH_WINDOWS_DEVICE_TESTING"
          exit `$LASTEXITCODE
          "@ | Set-Content -Path $script -Encoding UTF8

          $containerScript = "$containerRepo/nvbench-windows-ci.ps1"
          Copy-Item $script "${{ github.workspace }}\nvbench-windows-ci.ps1"

          $dockerArgs = @(
            "run", "--rm",
            "--mount", "type=bind,source=$hostRepo,target=$containerRepo",
            "--workdir", $containerRepo,
            "--isolation=process",
            "--env", "AWS_ACCESS_KEY_ID=$env:AWS_ACCESS_KEY_ID",
            "--env", "AWS_SECRET_ACCESS_KEY=$env:AWS_SECRET_ACCESS_KEY",
            "--env", "AWS_SESSION_TOKEN=$env:AWS_SESSION_TOKEN",
            "--env", "CI=true",
            "--env", "GITHUB_ACTIONS=$env:GITHUB_ACTIONS",
            "--env", "GITHUB_REF_NAME=$env:GITHUB_REF_NAME",
            "--env", "GITHUB_REPOSITORY=$env:GITHUB_REPOSITORY",
            "--env", "GITHUB_RUN_ID=$env:GITHUB_RUN_ID",
            "--env", "GITHUB_SHA=$env:GITHUB_SHA",
            "--env", "NVBENCH_WINDOWS_ARCH=$env:NVBENCH_WINDOWS_ARCH",
            "--env", "NVBENCH_WINDOWS_CUDA=$env:NVBENCH_WINDOWS_CUDA",
            "--env", "NVBENCH_WINDOWS_DEVICE_TESTING=$env:NVBENCH_WINDOWS_DEVICE_TESTING",
            "--env", "NVBENCH_WINDOWS_GPU=$env:NVBENCH_WINDOWS_GPU",
            "--env", "NVBENCH_WINDOWS_RUN_TESTS=$env:NVBENCH_WINDOWS_RUN_TESTS",
            "--env", "NVBENCH_WINDOWS_STD=$env:NVBENCH_WINDOWS_STD",
            "--env", "SCCACHE_BUCKET=$env:SCCACHE_BUCKET",
            "--env", "SCCACHE_IDLE_TIMEOUT=$env:SCCACHE_IDLE_TIMEOUT",
            "--env", "SCCACHE_REGION=$env:SCCACHE_REGION",
            "--env", "SCCACHE_S3_NO_CREDENTIALS=$env:SCCACHE_S3_NO_CREDENTIALS",
            "--env", "SCCACHE_S3_PREPROCESSOR_CACHE_KEY_PREFIX=$env:SCCACHE_S3_PREPROCESSOR_CACHE_KEY_PREFIX",
            "--env", "SCCACHE_S3_USE_PREPROCESSOR_CACHE_MODE=$env:SCCACHE_S3_USE_PREPROCESSOR_CACHE_MODE",
            "--env", "SCCACHE_S3_USE_SSL=$env:SCCACHE_S3_USE_SSL"
          )

          if ($env:NVBENCH_WINDOWS_GPU -eq "true") {
            if (-not $env:NVBENCH_WINDOWS_GPU_DEVICES) {
              throw "NVBENCH_WINDOWS_GPU_DEVICES must not be empty when GPU support is enabled."
            }
            $dockerArgs += @("--gpus", $env:NVBENCH_WINDOWS_GPU_DEVICES)
          }

          $dockerArgs += @(
            "$env:WINDOWS_CI_IMAGE",
            "powershell", "-NoLogo", "-NoProfile", "-ExecutionPolicy", "Bypass",
            "-File", $containerScript
          )

          docker @dockerArgs
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
